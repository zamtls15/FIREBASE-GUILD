<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Mobile UX</title>
    <style>
        /* Responsive spacing */
        body {
            margin: 0;
            padding: 0;
            font-size: 16px; /* Improved text size */
        }
        .container {
            padding: 16px; /* Increased padding for touch targets */
        }
        /* Layout breakpoints for screens 600px and below */
        @media (max-width: 600px) {
            body {
                font-size: 18px; /* Larger text size for mobile */
            }
            .button {
                padding: 12px 20px; /* Larger touch targets */
                font-size: 18px;
            }
            .container {
                padding: 12px; /* Adjusted spacing for small screens */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Firebase Guild!</h1>
        <p>This is a sample page to demonstrate improved mobile UX.</p>
        <button class="button">Get Started</button>
    </div>
</body>
</html>
